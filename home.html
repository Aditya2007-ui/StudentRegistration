<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
        }
        .card { 
            background: white; padding: 60px; border-radius: 20px; 
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }
        h1 { color: #222; margin-bottom: 15px; font-size: 32px; }
        p { color: #666; margin-bottom: 30px; font-size: 18px; }
        .btn { 
            background: #ff4b2b; color: white; padding: 18px 40px; 
            text-decoration: none; border-radius: 50px; font-weight: bold; 
            font-size: 18px; transition: 0.4s; display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
        }
        .btn:hover { background: #ff416c; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Student Management System</h1>
        <p>Manage your cloud database records easily.</p>
        <a href="index.html" class="btn">Launch Registration Form</a>
    </div>
</body>
</html>
