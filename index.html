<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f7f6; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .form-container { 
            background: white; width: 400px; padding: 40px; 
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; margin-bottom: 30px; color: #333; letter-spacing: 1px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 7px; font-weight: 500; color: #555; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #1e3c72; box-shadow: 0 0 5px rgba(30, 60, 114, 0.2); }
        button { 
            width: 100%; padding: 14px; background: #1e3c72; color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: 0.3s; 
        }
        button:hover { background: #2a5298; }
        .footer-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .footer-link:hover { color: #1e3c72; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>New Student</h2>
        <form action="RegisterServlet" method="post">
            <div class="group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="group">
                <label>Phone</label>
                <input type="text" name="phone" required>
            </div>
            <div class="group">
                <label>Course</label>
                <input type="text" name="course" required>
            </div>
            <button type="submit">Save Student</button>
        </form>
        <a href="home.html" class="footer-link">Return to Home</a>
    </div>
</body>
</html>
